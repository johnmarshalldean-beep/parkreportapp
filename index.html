<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Park Report</title><style>body{margin:0;background:#08324a;color:white;font-family:Arial,sans-serif;padding:14px}main,.top{max-width:760px;margin:auto}.top{display:flex;align-items:center;gap:12px}.logo{width:80px;border-radius:18px}.card{background:#0f4b40;border:1px solid #ffffff33;border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 12px 35px #0008}h1,h2,p{margin-top:0}label{display:block;margin:12px 0;font-weight:bold}input,select,textarea,button{width:100%;box-sizing:border-box;border-radius:14px;border:0;padding:14px;font-size:16px}input,select,textarea{background:#062433;color:white;border:1px solid #ffffff33}.btn{background:#f2c94c;color:#082434;font-weight:900;margin-top:10px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tab{background:#0a2f46;color:white;border:1px solid #ffffff33}.active{background:#f2c94c;color:#082434}.hide{display:none}.report{background:#092b3f;border-left:6px solid #f2c94c;border-radius:18px;padding:14px;margin:12px 0}.muted{color:#d6e6ea}.pill{display:inline-block;background:#ffffff22;border-radius:99px;padding:6px 10px;margin:4px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}</style></head><body><div class="top"><img class="logo" src="county-badge.svg"><div><p class="muted">Experience Warren County</p><h1>Park Report</h1><p>Report • Repair • Complete</p></div></div><main><section id="loginBox" class="card"><img class="logo" src="county-badge.svg"><h2>Enter PIN</h2><p class="muted">Use your assigned crew PIN.</p><input id="pin" inputmode="numeric" maxlength="4" placeholder="••••"><button class="btn" id="openBtn">Open App</button><p id="err"></p></section><section id="appBox" class="hide"><div class="card"><p class="muted">Signed in as</p><h2 id="who"></h2><button class="tab" id="logoutBtn">Logout</button></div><div class="tabs"><button id="tnew" class="tab active">New</button><button id="treports" class="tab">Reports</button><button id="tadmin" class="tab hide">Admin</button></div><section id="new" class="card"><h2>New Park Report</h2><label>Park<select id="park"></select></label><label>Category<select id="cat"><option>Playground</option><option>Electrical</option><option>Plumbing</option><option>Building</option><option>Grounds</option><option>Athletic Field</option><option>Trash</option><option>Safety Hazard</option><option>Boat Ramp</option><option>Other</option></select></label><label>Priority<select id="pri"><option>Low</option><option selected>Medium</option><option>High</option><option>Emergency</option></select></label><label>Description<textarea id="desc" rows="4" placeholder="What needs fixed?"></textarea></label><button class="btn" id="submitBtn">Submit Report</button><p id="msg"></p></section><section id="reports" class="hide"><div class="card"><input id="search" placeholder="Search"><select id="filter"><option>All</option><option>New</option><option>Assigned</option><option>In Progress</option><option>Completed</option></select></div><div id="list"></div></section><section id="admin" class="hide"><div class="card grid"><div><h2 id="newCount">0</h2><p>New</p></div><div><h2 id="doneCount">0</h2><p>Done</p></div></div></section></section></main><script>const users={1111:['John','admin'],2222:['Reid','admin'],3333:['Tiffany','admin'],4444:['Worker 1','worker'],5555:['Worker 2','worker'],6666:['Worker 3','worker']};const parks=['Fantasy Land','Lions Park','Rockland Park','LeHew Park','Chimney Field','Eastham Park','Gertrude E. Miller Park','15th Street Fields','Soccer Plex','Skate Park','Boat Ramp Only Area','Bing Crosby Stadium','Warren County Community Center','Other Warren County Area'];let me=null;parks.forEach(p=>park.add(new Option(p,p)));openBtn.onclick=doLogin;submitBtn.onclick=submitReport;logoutBtn.onclick=()=>{delete localStorage.pin;location.reload()};tnew.onclick=()=>showTab('new');treports.onclick=()=>showTab('reports');tadmin.onclick=()=>showTab('admin');search.oninput=draw;filter.onchange=draw;function data(){try{return JSON.parse(localStorage.reports||'[]')}catch(e){return []}}function save(v){localStorage.reports=JSON.stringify(v)}function doLogin(){let u=users[pin.value.trim()];if(!u){err.textContent='PIN not found';return}me={name:u[0],role:u[1]};localStorage.pin=pin.value.trim();who.textContent=me.name+' - '+me.role;loginBox.classList.add('hide');appBox.classList.remove('hide');tadmin.classList.toggle('hide',me.role!=='admin');draw()}function showTab(x){['new','reports','admin'].forEach(id=>document.getElementById(id).classList.add('hide'));document.getElementById(x).classList.remove('hide');['tnew','treports','tadmin'].forEach(id=>document.getElementById(id).classList.remove('active'));document.getElementById('t'+x).classList.add('active');draw()}function submitReport(){if(!me){alert('Log in first');return}let d=desc.value.trim();if(!d){msg.textContent='Add a description first.';return}let r={id:Date.now(),park:park.value,cat:cat.value,pri:pri.value,desc:d,status:'New',by:me.name,at:new Date().toLocaleString()};save([r,...data()]);desc.value='';msg.textContent='Report submitted.';showTab('reports')}function draw(){let q=(search.value||'').toLowerCase(),f=filter.value||'All';let rows=data().filter(r=>(f==='All'||r.status===f)&&JSON.stringify(r).toLowerCase().includes(q));list.innerHTML=rows.length?'':'<div class=card><h2>No reports yet</h2></div>';rows.forEach(r=>{let e=document.createElement('div');e.className='report';e.innerHTML='<h2>'+r.park+'</h2><p>'+r.desc+'</p><span class=pill>'+r.cat+'</span><span class=pill>'+r.pri+'</span><span class=pill>'+r.status+'</span><p class=muted>'+r.by+' • '+r.at+'</p>';if(me&&me.role==='admin'){['Assigned','In Progress','Completed'].forEach(s=>{let b=document.createElement('button');b.className='btn';b.textContent=s;b.onclick=()=>{r.status=s;save(data().map(x=>x.id===r.id?r:x));draw()};e.appendChild(b)})}list.appendChild(e)});newCount.textContent=data().filter(r=>r.status==='New').length;doneCount.textContent=data().filter(r=>r.status==='Completed').length}if(localStorage.pin){pin.value=localStorage.pin;setTimeout(doLogin,50)}</script></body></html>
